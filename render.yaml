services:
  - type: web
    name: bump-house
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bump-house-db
          property: connectionString

databases:
  - name: bump-house-db
    databaseName: bumphouse
    user: bumphouse
