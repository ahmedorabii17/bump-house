<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — Pump House</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f5f4f0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .login-card {
      max-width: 380px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e3db;
      padding: 36px 32px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .logo-wrap h4 {
      font-weight: 700;
      margin: 0;
    }

    .logo-wrap h4 span {
      color: #E85D24;
    }

    .btn-primary {
      background: #1a1a1a;
      border-color: #1a1a1a;
      width: 100%;
      padding: 11px;
    }

    .btn-primary:hover {
      background: #333;
      border-color: #333;
    }

    .flash-error {
      background: #FCEBEB;
      color: #A32D2D;
      border: none;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Pump House">
      <h4>Pump <span>House</span></h4>
      <div class="text-muted small">نظام إدارة الأعضاء</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="alert flash-{{ category }} mb-3">{{ message }}</div>
    {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label small text-muted">اسم المستخدم</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label small text-muted">كلمة السر</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">دخول</button>
    </form>
  </div>
</body>

</html>
