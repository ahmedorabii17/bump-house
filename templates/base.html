<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bump House{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f4f0; font-family: 'Segoe UI', Tahoma, sans-serif; }

    .navbar-brand { font-weight: 700; font-size: 1.4rem; letter-spacing: 0.5px; }
    .navbar-brand span { color: #E85D24; }
    .navbar { background: #fff !important; border-bottom: 1px solid #e5e3db; }

    .badge-ok      { background: #EAF3DE; color: #3B6D11; }
    .badge-warning { background: #FAEEDA; color: #854F0B; }
    .badge-expired { background: #FCEBEB; color: #A32D2D; }

    .card { border: 1px solid #e5e3db; border-radius: 12px; box-shadow: none; }
    .btn-primary { background: #1a1a1a; border-color: #1a1a1a; }
    .btn-primary:hover { background: #333; border-color: #333; }

    .member-card { transition: border-color .15s; cursor: pointer; }
    .member-card:hover { border-color: #1a1a1a; }

    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 15px; flex-shrink: 0;
    }

    .stat-card { border-radius: 12px; padding: 16px 20px; border: 1px solid #e5e3db; background: #fff; }
    .stat-num { font-size: 28px; font-weight: 700; }

    .flash-success { background: #EAF3DE; color: #3B6D11; border: none; border-radius: 10px; }
    .flash-error   { background: #FCEBEB; color: #A32D2D; border: none; border-radius: 10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">Bump <span>House</span></a>
    <a href="{{ url_for('add') }}" class="btn btn-primary btn-sm ms-auto">
      <i class="bi bi-plus-lg me-1"></i> عضو جديد
    </a>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert flash-{{ category }} mb-3">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
